# Фрагмент для server {} сайта sklad24.uz.
# Хостинг на nginx — правила из public/.htaccess не применяются.
# Сейчас try_files ... /index.html отдаёт лендинг на любых URL → ошибка Lighthouse canonical.

index index.html;

location = /index.html {
  return 301 https://sklad24.uz/;
}

# Отдаём только реальные файлы; несуществующие пути — 404 (не index.html)
location / {
  try_files $uri $uri/ =404;
}

